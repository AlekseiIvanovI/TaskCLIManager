<!DOCTYPE html>
<html>
<head>
    <title>TaskCLI - Task List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .completed {
            text-decoration: line-through;
            color: #999;
        }
        .status-done {
            color: green;
            font-weight: bold;
        }
        .status-pending {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>TaskCLI - Task List</h1>
    <p>Total tasks: 2</p>
    <table>
        <tr>
            <th>ID</th>
            <th>Status</th>
            <th>Task</th>
        </tr>
        <tr>
            <td>1</td>
            <td class="status-done">✓</td>
            <td class="completed">Complete the project report</td>
        </tr>
        <tr>
            <td>3</td>
            <td class="status-pending">✗</td>
            <td class="">Meeting with team</td>
        </tr>
    </table>
    <p><small>Generated by TaskCLI on 
2025-05-13 13:13:58</small></p>
</body>
</html>
